services:
  - type: web
    name: haber-yemek-sitesi
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: COLLECT_API_KEY
        sync: false
      - key: UPLOADS_DIR
        value: /data/uploads
    disk:
      name: uploads-data
      mountPath: /data/uploads
      sizeGB: 1
